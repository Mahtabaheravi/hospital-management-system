<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#e8f6e9;
}

.dashboard{
    display:flex;
    min-height:100vh;
}

/* Sidebar */

.sidebar{
    width:240px;
    background:#0d330e;
    color:#ffefb3;
    padding:25px 15px;
    position:fixed;
    top:0;
    left:0;
    height:100vh;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:50px;
}

.logo img{
    width:50px;
    height:50px;
    border-radius: 50%;
    object-fit:contain;
}

.logo span{
    font-size:24px;
    font-weight:bold;
}

.menu{
    list-style:none;
}

.menu li{
    margin-bottom:12px;
}

.menu li a{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:#ffefb3;
    padding:12px;
    border-radius:10px;
    transition:.3s;
}

.menu li a:hover{
    background:#ffefb3;
    color:#0d330e;
}

.menu li a:hover,
.menu li a.active{
    background: #ffefb3;
    color: #0d330e;
    font-weight: 600;
}
.menu li a i{
    width:20px;
    text-align:center;
}

/* Main */

.main-content{
    margin-left:260px;
    width:calc(100% - 260px);
    padding:25px;
    box-sizing: border-box;
}


.page-header{
    margin-bottom: 20px;
}
.page-header h2{
    color: #0d330e;
}
.page-header p{
    color: #333;
    font-size: 14px;
}
.profile-grid{

    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;

}


.profile-card{
    background:white;
    padding:25px;
    border-radius:18px;
    border-left:5px solid #0d330e;
    border-right:5px solid #0d330e;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    transition: all 0.3s ease;

}


.profile-card h3{

    color:#0d330e;
    margin-bottom:20px;
    padding-bottom:12px;
    border-bottom:2px solid #e8f6e9;

}
.form-grid{

    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;

}
.input-row{

    display:flex;
    flex-direction:column;

}


.input-row label{

    color:#0d330e;
    font-weight:bold;
    font-size:15px;
    margin-bottom:8px;

}



.input-row input,
.input-row select,
.input-row textarea{

    width:100%;
    padding:12px 15px;
    border:1px solid #d0d8d0;
    border-radius:10px;
    outline:none;
    background:white;
    color:#333;
    font-size:15px;
    transition:.3s;

}



.input-row input:focus,
.input-row select:focus,
.input-row textarea:focus{

    border-color:#0d330e;
    box-shadow:0 0 8px rgba(13,51,14,.2);

}



.input-row textarea{

    min-height:100px;
    resize:none;

}


.input-row select{
    cursor:pointer;

}

.form-buttons{

    margin-top:30px;
    display:flex;
    justify-content:flex-end;
    gap:15px;

}

.save-btn{

    background:#0d330e;
    color:#ffefb3;
    border:none;
    padding:12px 30px;
    border-radius:10px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;

}



.save-btn:hover{

    background:#145c17;
    transform:translateY(-2px);

}



.cancel-btn{

    background:#ddd;
    color:#333;
    border:none;
    padding:12px 30px;
    border-radius:10px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;

}



.cancel-btn:hover{

    background:#c5c5c5;

}

.profile-card:nth-child(3){
    grid-column:span 2;

}

.profile-card:nth-child(4){
    grid-column:span 2;

}
form{

    margin-bottom:30px;

}
.profile-card:hover{
    transform: translateY(-6px);
    box-shadow:  0 14px 30px rgba(0,0,0,0.18);
}


@media(max-width:1024px){

    .sidebar{
    width:200px;
    padding:20px 10px;
}

.logo{
    gap:8px;
    margin-bottom:35px;
}

.logo img{
    width:45px;
    height:45px;
}

.logo span{
    font-size:20px;
}

.menu li a{
    font-size:14px;
    padding:10px;
    gap:8px;
}


.main-content{
    margin-left:220px;
    width:calc(100% - 220px);
    padding:20px;
}


.profile-grid{
    grid-template-columns:1fr 1fr;
    gap:15px;
}


.form-grid{
    grid-template-columns:1fr;
    gap:15px;
}


.profile-card:nth-child(3),
.profile-card:nth-child(4){
    grid-column:span 2;
}


.save-btn,
.cancel-btn{
    padding:10px 20px;
}

}
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <img src="pic/abstract-wings-cross-healthcare-icon_1034893-5577.jpg" alt="">
                <span>HealthCare</span>
            </div>
    
            <ul class="menu" >
                <li >
                    <a  href="index.html">
                        <i class="fa-solid fa-house"></i>
                        Home
                    </a>
                </li>
                <li>
                    <a href="doctors.html">
                        <i class="fa-solid fa-user-doctor"></i>
                        Doctors
                    </a>
                </li>
                <li>
                    <a href="patients.html">
                        <i class="fa-solid fa-bed"></i>
                        Patients
                    </a>
                </li>
                <li>
                    <a  href="appointment.html">
                        <i class="fa-solid fa-calendar-check"></i>
                        Appointments
                    </a>
                </li>
                <li>
                    <a class="active" href="payment.html">
                        <i class="fa-solid fa-credit-card"></i>
                        Payments
                    </a>
                </li>
                <li>
                    <a href="report.html">
                        <i class="fa-solid fa-chart-line"></i>
                        Reports
                    </a>
                </li>
                <li>
                    <a href="setting.html">
                        <i class="fa-solid fa-gear"></i>
                        Settings
                    </a>
                </li>
            </ul>
        </aside>
        <main class="main-content">

                <div class="page-header">
            
                    <div>
                        <h2>Add Payment</h2>
                        <p>Home > Payments > Add Payment</p>
                    </div>
            
                </div>
            
            
                <form>
                    <div class="profile-grid">
            
                        <div class="profile-card">
            
                            <h3>Payment Information</h3>
            
            
                            <div class="form-grid">
            
            
                                <div class="input-row">
            
                                    <label>Invoice ID</label>
                                    <input type="text" value="#INV-0001">
            
                                </div>
            
            
                                <div class="input-row">
            
                                    <label>Patient Name</label>
                                    <input type="text" value="Ahmad Khan">
            
                                </div>
            
            
                                <div class="input-row">
            
                                    <label>Payment Amount</label>
                                    <input type="number" value="500">
            
                                </div>
            
            
                                <div class="input-row">
            
                                    <label>Payment Date</label>
                                    <input type="date">
            
                                </div>
            
            
                            </div>
            
            
                        </div>
                        <div class="profile-card">
            
                            <h3>Payment Method</h3>
            
                            <div class="form-grid">
            
            
                                <div class="input-row">
            
                                    <label>Payment Type</label>
            
                                    <select>
            
                                        <option selected>Cash</option>
                                        <option>Card</option>
                                        <option>Bank Transfer</option>
                                        <option>PayPal</option>
            
                                    </select>
            
                                </div>
            
            
            
                                <div class="input-row">
            
                                    <label>Status</label>
            
                                    <select>
            
                                        <option selected>Paid</option>
                                        <option>Pending</option>
                                        <option>Cancelled</option>
            
                                    </select>
            
                                </div>
            
            
            
                                <div class="input-row">
            
                                    <label>Doctor</label>
            
                                    <input type="text" value="Dr. John Smith">
            
                                </div>
            
            
            
                                <div class="input-row">
            
                                    <label>Department</label>
            
                                    <input type="text" value="Cardiology">
            
                                </div>
            
            
                            </div>
            
            
                        </div>
                        <div class="profile-card">
            
                            <h3>Payment Notes</h3>
            
            
                            <div class="input-row">
            
                                <label>Notes</label>
            
                                <textarea>
            Payment received successfully for patient treatment.
                                </textarea>
            
                            </div>
            
            
                        </div>
                        <div class="profile-card">
                            <h3>Receipt Information</h3>
                            <div class="form-grid">
            
                                <div class="input-row">
            
                                    <label>Receipt Number</label>
            
                                    <input type="text" value="REC-2026-001">
            
                                </div>
            
            
            
                                <div class="input-row">
            
                                    <label>Created By</label>
            
                                    <input type="text" value="Admin">
            
                                </div>
            
            
                            </div>
            
            
                        </div>
            
            
            
                    </div>           
                    <div class="form-buttons">
                        <button type="submit" class="save-btn">
                            Save Payment
                        </button>
                        <button type="reset" class="cancel-btn">
                            Cancel
                        </button>
                    </div>
                </form>
        </main>
    
</body>
</html>
